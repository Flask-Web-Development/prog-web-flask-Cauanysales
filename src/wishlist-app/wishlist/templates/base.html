<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Wishlist{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

<nav>
    <h1>Minha Wishlist</h1>

    {% if g.user %}
        <a href="{{ url_for('wishlist.index') }}">Lista de desejos</a>
        <a href="{{ url_for('wishlist.create') }}">Adicionar desejo</a>
        <a href="{{ url_for('auth.logout') }}">Sair</a>
    {% else %}
        <a href="{{ url_for('auth.register') }}">Registrar</a>
        <a href="{{ url_for('auth.login') }}">Login</a>
    {% endif %}
</nav>

<section class="content">

    {% for message in get_flashed_messages() %}
        <div class="flash">
            {{ message }}
        </div>
    {% endfor %}

    {% block content %}
    {% endblock %}

</section>

</body>
</html>
