{% extends 'base.html' %}

{% block title %}
Adicionar desejo
{% endblock %}


{% block content %}

<h2>Novo desejo</h2>


<form method="post">

<label>Nome do produto</label>

<input name="title" required>


<label>Descrição</label>

<textarea name="description"></textarea>


<label>Link do produto</label>

<input name="link">


<label>Preço</label>

<input name="price" type="number" step="0.01">


<button type="submit">
Salvar
</button>


</form>


{% endblock %}
