{% extends 'base.html' %}

{% block title %}
Login
{% endblock %}

{% block content %}

<h2>Login</h2>

<form method="post">

    <label>Usuário</label>
    <input name="username" required>

    <label>Senha</label>
    <input type="password" name="password" required>

    <button type="submit">Entrar</button>

</form>

{% endblock %}
